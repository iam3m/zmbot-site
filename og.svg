<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8c00"/>
      <stop offset="1" stop-color="#00d26a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#e8edf2" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Top: logo + tag -->
  <g transform="translate(70,70)">
    <circle cx="22" cy="22" r="20" fill="none" stroke="#1c1c22" stroke-width="1.5"/>
    <path d="M6 34 L16 18 L22 26 L30 10 L38 14"
          fill="none" stroke="#ff8c00" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="38" cy="14" r="2.8" fill="#00d26a"/>
    <text x="58" y="32"
          font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="26" font-weight="800" letter-spacing="-0.5"
          fill="#e8edf2">ZM<tspan fill="#ff8c00">BOT</tspan></text>
  </g>

  <text x="1130" y="102" text-anchor="end"
        font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" letter-spacing="3"
        fill="#7a7a84">LIVE · PUBLIC DASHBOARD · zm-bot.com</text>

  <!-- Main headline -->
  <g transform="translate(70,220)">
    <text font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-weight="900" letter-spacing="-3" fill="#e8edf2">
      <tspan x="0" y="0" font-size="78">The $99 bot</tspan>
      <tspan x="0" y="92" font-size="78">that traded</tspan>
      <tspan x="0" y="184" font-size="92" fill="#00d26a">+$2,088</tspan>
      <tspan x="350" y="184" font-size="78" fill="#7a7a84" font-weight="400">in one day.</tspan>
    </text>
  </g>

  <!-- Stats strip -->
  <g transform="translate(70,550)">
    <text font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="18" letter-spacing="1" fill="#7a7a84">
      <tspan x="0" y="0">APR 17 · 2026</tspan>
      <tspan x="200" y="0">14 TRADES</tspan>
      <tspan x="360" y="0" fill="#00d26a">10W / 4L</tspan>
      <tspan x="520" y="0">71% WIN RATE</tspan>
      <tspan x="760" y="0">4 TAKE-PROFITS IN 2 HOURS</tspan>
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="615" width="1200" height="15" fill="url(#accent)"/>
</svg>
